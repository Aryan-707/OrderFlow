version: "3.8"
services:
  broker:
    image: apache/kafka:latest
    restart: always
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVCNTcwNTJENDM2Qk"
    networks:
      - saga-net

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: saga_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saga-net

  booking-orchestrator:
    image: kafka-saga-booking-system/booking-orchestrator:1.0-SNAPSHOT
    ports:
      - "8080:8080"
    depends_on:
      - broker
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - saga-net

  payment-service:
    image: kafka-saga-booking-system/payment-service:1.0-SNAPSHOT
    depends_on:
      - broker
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - saga-net

  seat-inventory-service:
    image: kafka-saga-booking-system/seat-inventory-service:1.0-SNAPSHOT
    depends_on:
      - broker
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - saga-net

networks:
  saga-net: